<div class="cripto-container">
    <h3>Selecciona una Criptomoneda</h3>
    <div class="cripto-grid">
      <button *ngFor="let cripto of criptos"
              [class.active]="criptoSeleccionada === cripto.simbolo"
              (click)="seleccionarCripto(cripto.simbolo)">
        {{ cripto.nombre }} ({{ cripto.simbolo }})
      </button>
    </div>
  
    <div class="inversion-form" *ngIf="criptoSeleccionada">
      <p>Criptomoneda: <strong>{{ criptoSeleccionada }}</strong></p>
  
      <label>Monto a invertir:</label>
      <input type="number" [(ngModel)]="monto" placeholder="Ej. 1000" />
  
      <label>Duración (días):</label>
      <select [(ngModel)]="duracion">
        <option value="" disabled selected>Selecciona una duración</option>
        <option value="30">30 días</option>
        <option value="60">60 días</option>
        <option value="90">90 días</option>
      </select>
  
      <button (click)="confirmarInversion()">Confirmar Inversión</button>
    </div>
  </div>
